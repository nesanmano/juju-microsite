    <style>
        .grid-container {

         }

        .mediaContainer{text-align: center;}

        .grid-container2>div{ text-align: center;}

        #slider {
            display: inline-block;
            text-align: center;
            max-width: 640px;
            margin: 0 auto;
            -webkit-transform: translateZ(0);
            transition: all 0.5s ease-out;
        }

        #overflow {
            width: 100%;
            overflow: hidden;
        }
        #slider img {
            width: 100%;
            height: auto;
        }
        #slides .inner {
            width: 500%;
            line-height: 0;
        }
        #slides article {
            width: 20%;
            float: left;
        }

        #controls {
            margin: -25% 0 0 0;
            width: 100%;
            height: 50px;
        }
        #controls label {
            display: none;
            width: 50px;
            height: 50px;
            opacity: 0.3;
        }
        #active {
            margin: 10px 0 0;
            text-align: center;
        }
        #active label {
            border-radius: 5px;
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #bbb;
            -webkit-transform: translateZ(0);
            transition: opacity 0.2s ease-out;
        }
        #active label:hover {
            background: #ccc;
            border-color: #777 !important;
        }
        #controls label:hover {
            opacity: 0.8;
        }

        #slides {
            border-radius: 5px;
            box-shadow: 1px 1px 4px #666;
            padding: 15px;
            background: #fff;
            background: rgb(252, 255, 244);
            background: linear-gradient(top, rgba(252, 255, 244, 1) 0%, rgba(219, 218, 201, 1) 100%);
        }
        /* Animation */
        #slides .inner {
            transition: all 800ms cubic-bezier(0.770, 0.000, 0.175, 1.000);
            transition-timing-function: cubic-bezier(0.770, 0.000, 0.175, 1.000);
        }

        #slide1:checked ~ #active label:nth-child(1),
        #slide2:checked ~ #active label:nth-child(2),
        #slide3:checked ~ #active label:nth-child(3),
        #slide4:checked ~ #active label:nth-child(4),
        #slide5:checked ~ #active label:nth-child(5) {
            background: #333;
            border-color: #333 !important;
        }
        label, #active, img {
            -moz-user-select:none;
            -webkit-user-select:none;
        }
        input {
            display: none;
        }
        #slide1:checked ~ #slides .inner {
            margin-left:0;
        }
        #slide2:checked ~ #slides .inner {
            margin-left:-100%;
        }
        #slide3:checked ~ #slides .inner {
            margin-left:-200%;
        }
        #slide4:checked ~ #slides .inner {
            margin-left:-300%;
        }
        #slide5:checked ~ #slides .inner {
            margin-left:-400%;
        }

        /* Responsive Styling */
        @media only screen and (max-width: 850px) and (min-width: 450px) {
            #slider #controls {
                margin: -25% 0 0 15%;
                width: 70%;
                height: 50px;
            }
            #slider #controls label {
                transform: scale(0.8);
            }
            #slider #slides {
                padding: 1% 0;
                border-radius: 0px;
            }
            #slider #active {
                margin: 22% 0 0;
            }
        }
        /* Mobile */
        #mobile:checked ~ #slider #controls {
            margin: -28% 0 0 24%;
            width: 50%;
            height: 50px;
        }
        #mobile:checked ~ #slider #active {
            margin: 23% 0 0;
        }
        #mobile:checked ~ #slider #slides .info {
            opacity: 0 !important;
        }
        #mobile:checked ~ #slider #controls label {
            transform: scale(0.6);
        }
        @media only screen and (max-width: 450px) {
            #slider #controls {
                margin: -28% 0 0 24%;
                width: 50%;
                height: 50px;
            }
            #slider #active {
                margin: 23% 0 0;
            }
            #slider #slides {
                padding: 1% 0;
                border-radius: 0px;
            }
            #slider #slides .info {
                opacity: 0 !important;
            }
            #slider #controls label {
                transform: scale(0.6);
            }
        }
        @media only screen and (min-width: 850px) {
            body {
                padding: 0 80px;
            }
        }

    </style>

        }

        function iFrameResize(iframe) {
